<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light" data-color-theme="Kunyang_Theme" data-layout="vertical">

<head>
  <!-- Required meta tags -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon icon-->
  <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.png" />

  <!-- Core Css -->
  <link rel="stylesheet" href="../assets/css/styles.css" />

  <title>MatDash Bootstrap Admin</title>

<body>
  <!-- Preloader -->
  <div class="preloader">
    <img src="../assets/images/logos/favicon.png" alt="loader" class="lds-ripple img-fluid" />
  </div>
  <div id="main-wrapper">
    <div class="position-relative overflow-hidden radial-gradient min-vh-100 w-100">
      <div class="position-relative z-index-5">
        <div class="row gx-0">

          <div class="col-lg-6 col-xl-5 col-xxl-4">
            <div class="min-vh-100 bg-body row justify-content-center align-items-end">
              <div class="col-12 auth-card">

                <div class="p-2 px-4">
                  <div class="mb-2 text-center">
                    <a href="../main/index.html" class="text-nowrap logo-img d-block w-100">
                      <img src="../assets/images/logos/logo_kunyang.png" class="dark-logo" alt="Logo-Dark" />
                    </a>
                  </div>

                  <p class="mb-9 text-center">* 로그인을 통해 <strong class="text-dark">NAVI(LXP)</strong>서비스를 이용하실 수 있습니다.</p>

                  <!-- 로그인 박스 -->
                  <div class="item loginbox_grid">

                    <div class="loginbox">

                      <!-- 로그인 전 -->
                      <div class="before">

                        <!-- 로그인 탭 -->
                        <div class="login_tab">
                          <ul>
                            <li>
                              <a href="#" class="active btn_normalbox">일반 로그인</a>
                            </li>
                            <li>
                              <a href="#" class="btn_totalbox">통합 로그인</a>
                            </li>
                          </ul>
                        </div>
                        <!--// 로그인 탭 -->

                        <!-- 통합로그인 영역 -->
                        <div class="total_box" style="display:none;">
                          <a href="./02_나의강의실_01_창의융합과정_01_나의강의실입장.html" class="btn btn-primary w-100 py-8 rounded-2">통합 로그인</a>
                          <div class="login_ment">※ 통합 로그인을 통해 간편하게 N.A.V.I를 이용하실 수 있습니다.</div>
                        </div>
                        <!--// 통합로그인 영역 -->

                        <!-- 일반로그인 영역 -->
                        <div class="normal_box">

                          <div class="info_insert">
                            <form>
                              <div class="form-floating mb-3">
                                <input type="text" class="form-control" placeholder="Username">
                                <label>
                                  <i class="ti ti-user me-2 fs-4"></i> 아이디
                                </label>
                              </div>
                              <div class="form-floating mb-3">
                                <input type="password" class="form-control" placeholder="Password">
                                <label>
                                  <i class="ti ti-lock me-2 fs-4"></i> 비밀번호
                                </label>
                              </div>

                              <div class="d-sm-flex align-items-center justify-content-between mb-4">
                                <div class="form-check">
                                  <input class="form-check-input primary" type="checkbox" value="" id="flexCheckChecked" checked />
                                  <label class="form-check-label text-dark" for="flexCheckChecked">
                                    아이디 저장
                                  </label>
                                </div>
                              </div>
                              <a href="./02_나의강의실_01_창의융합과정_01_나의강의실입장.html" class="btn btn-primary w-100 py-8 rounded-2">로그인</a>

                            </form>
                          </div>

                        </div>
                        <!--// 일반로그인 영역 -->

                      </div>
                      <!--// 로그인 전 -->

                      <!-- SNS 간편 로그인 -->
                      <div class="">
                        <div class="text-center mt-4">
                          <h5 class="">SNS 간편 로그인</h5>
                        </div>
                        <div class="d-flex justify-content-center align-items-center py-2 gap-3">
                          <a href="#">
                            <img src="../assets/images/lxp/sns/naver.png" alt="네이버">
                          </a>
                          <a href="#">
                            <img src="../assets/images/lxp/sns/kakao.png" alt="카카오">
                          </a>
                          <a href="#">
                            <img src="../assets/images/lxp/sns/google.png" alt="구글">
                          </a>
                          <a href="#">
                            <img src="../assets/images/lxp/sns/apple.png" alt="애플">
                          </a>
                        </div>
                      </div>
                      <!--// SNS 간편 로그인 -->

                    </div>

                  </div>
                  <!--// 로그인 박스 -->
                </div>
              </div>
              <div class="col-12 border-top p-4">
                <div class="px-4">
                  서울특별시 서대문구 충정로29 동아일보사건물 15층 ㈜디유넷
                  <br />
                  COPYRIGHT ⓒ 2023 DUNET. ALL RIGHTS RESERVED.
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-6 col-xl-7 col-xxl-8 position-relative d-none d-lg-block d-flex align-items-center" style="background:url('../assets/images/navi_base/login/login_visual_kunyang_01.png'); background-position:center; background-size:cover">
            <!-- <div class="ms-10 ps-5 position-absolute bottom-50">
              <h1 class="fw-bold text-white" style="font-size:70px;">N.A.V.I</h1>
              <div class="fs-5 text-white" style="">N.A.V.I에 오신 것을 환영합니다.</div>
            </div> -->
          </div>
        </div>
      </div>
    </div>

  <div class="dark-transparent sidebartoggler"></div>

  <script src="../assets/js/vendor.min.js"></script>
  <script src="../assets/js/lxp.js"></script>

  <!-- Import Js Files -->
  <script src="../assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/libs/simplebar/dist/simplebar.min.js"></script>
  <script src="../assets/js/theme/app.init.js"></script>
  <script src="../assets/js/theme/theme.js"></script>
  <script src="../assets/js/theme/app.min.js"></script>

  <!-- solar icons -->
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
  <script src="../assets/libs/owl.carousel/dist/owl.carousel.min.js"></script>
  <script src="../assets/js/frontend-landingpage/homepage.js"></script>
